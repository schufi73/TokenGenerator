# SQLite JDBC configuration
spring.datasource.url=jdbc:sqlite:codes.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.platform=sqlite

# Admin portal login (override via env var ADMIN_PASSWORD in production)
admin.password=NetSource2025!
admin.login.max-attempts=5
admin.login.lockout-minutes=15

# Web server configuration (internal HTTP, nginx handles HTTPS)
server.port=8080
