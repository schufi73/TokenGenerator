services:
  token-generator:
    build: .
    expose:
      - "8080"
    volumes:
      - db-data:/app/db
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - token-generator
    restart: always

volumes:
  db-data:
